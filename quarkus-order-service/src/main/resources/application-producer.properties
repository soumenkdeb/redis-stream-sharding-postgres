quarkus.http.port=8001
quarkus.http.limits.max-initial-line-length=65536

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/orders_db
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.new-connection-sql=SET synchronous_commit=off
quarkus.datasource.devservices.enabled=false

# Jackson snake_case to match Python producer output
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# Redis shards (consumed by RedisConfig bean)
app.redis.urls=redis://:123456@localhost:6379,redis://:123456@localhost:6380,redis://:123456@localhost:6381,redis://:123456@localhost:6382
app.num-shards=4
app.batch-size=500
app.stream-base=orders:stream
app.group-name=order_processors
app.consumer-name=quarkus-consumer-1
app.ack-batch-size=500
app.ack-flush-interval-ms=5000
